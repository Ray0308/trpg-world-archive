<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>KP入力ページ — TRPG World Archive</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app app--kp">
    <div class="main-wrapper main-wrapper--full">
      <header class="header">
        <a href="index.html" class="site-title">TRPG World Archive</a>
        <span class="header-badge">KP</span>
      </header>

      <main class="kp-main" id="kpMain">
        <div class="kp-intro">
          <h1 class="kp-title">KP入力ページ</h1>
          <p class="kp-lead">各情報の登録は以下のフォームから行う</p>
        </div>
        <div class="kp-card-grid" id="kpCardGrid"></div>
      </main>

      <div class="kp-modal" id="kpNpcPicker" hidden aria-hidden="true">
        <div class="kp-modal-backdrop" data-kp-close></div>
        <div class="kp-modal-panel" role="dialog" aria-modal="true" aria-labelledby="kpNpcPickerTitle">
          <header class="kp-modal-header">
            <h2 class="kp-modal-title" id="kpNpcPickerTitle">NPCを編集</h2>
            <button type="button" class="kp-modal-close" data-kp-close aria-label="閉じる">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <div class="kp-modal-search">
            <input type="search" id="kpNpcSearch" placeholder="名前・ふりがなで検索..." aria-label="NPC検索">
          </div>
          <div class="kp-modal-body" id="kpNpcPickerBody">
            <p class="kp-modal-status">読み込み中...</p>
          </div>
        </div>
      </div>

      <footer class="footer">
        <p>© 2025 TRPG World Archive — KP</p>
      </footer>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/links.js"></script>
  <script src="kp.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#161616">
  <meta name="apple-mobile-web-app-title" content="YOKOFOLIA KP">
  <title>KP入力 — YOKOFOLIA</title>
  <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app app--kp">
    <div class="main-wrapper main-wrapper--full">
      <header class="header">
        <a href="index.html" class="site-brand">
          <img src="images/yokofolia-mascot.png" alt="" class="site-brand-mascot" width="36" height="36" decoding="async">
          <span class="site-brand-text">
            <span class="site-brand-name">YOKOFOLIA</span>
            <span class="site-brand-tagline">ふわっと住民台帳</span>
          </span>
        </a>
        <span class="header-badge">KP</span>
      </header>

      <main class="kp-main" id="kpMain">
        <div class="kp-intro">
          <div class="kp-intro-brand">
            <img src="images/yokofolia-mascot.png" alt="" class="kp-intro-mascot" width="64" height="64" decoding="async">
            <div>
              <h1 class="kp-title">KP入力ページ</h1>
              <p class="kp-lead">各情報の登録は以下のフォームから行う</p>
            </div>
          </div>
        </div>
        <div class="kp-card-grid" id="kpCardGrid"></div>
        <section class="kp-files-drive" id="kpFilesDrive" aria-labelledby="kpFilesDriveTitle"></section>
        <section class="kp-omake-economy" aria-labelledby="kpOmakeEconomyTitle">
          <h2 class="kp-section-title kp-omake-economy-title" id="kpOmakeEconomyTitle">オマケ通貨（菌糸コイン）</h2>
          <p class="kp-omake-economy-lead">チャウグナー・ランとミ＝ゴキャッチャーで共有。PL単位で残高を管理します。</p>
          <div id="kpMigoPlayers" aria-labelledby="kpMigoPlayersTitle"></div>
          <div id="kpMigoGift" aria-labelledby="kpMigoGiftTitle"></div>
          <div id="kpMigoShop" aria-labelledby="kpMigoShopTitle"></div>
        </section>
      </main>

      <div class="kp-modal" id="kpEntityPicker" hidden aria-hidden="true">
        <div class="kp-modal-backdrop" data-kp-close="kpEntityPicker"></div>
        <div class="kp-modal-panel" role="dialog" aria-modal="true" aria-labelledby="kpEntityPickerTitle">
          <header class="kp-modal-header">
            <h2 class="kp-modal-title" id="kpEntityPickerTitle">編集</h2>
            <button type="button" class="kp-modal-close" data-kp-close="kpEntityPicker" aria-label="閉じる">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <div class="kp-modal-search">
            <input type="search" id="kpEntityPickerSearch" placeholder="検索..." aria-label="検索">
          </div>
          <div class="kp-modal-body" id="kpEntityPickerBody">
            <p class="kp-modal-status">読み込み中...</p>
          </div>
        </div>
      </div>

      <div class="kp-modal" id="kpEntityList" hidden aria-hidden="true">
        <div class="kp-modal-backdrop" data-kp-close="kpEntityList"></div>
        <div class="kp-modal-panel kp-modal-panel--wide" role="dialog" aria-modal="true" aria-labelledby="kpEntityListTitle">
          <header class="kp-modal-header">
            <h2 class="kp-modal-title" id="kpEntityListTitle">一覧（KP用）</h2>
            <button type="button" class="kp-modal-close" data-kp-close="kpEntityList" aria-label="閉じる">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <p class="kp-modal-hint" id="kpEntityListHint"></p>
          <div class="kp-npc-list-head">
            <p class="kp-npc-list-summary" id="kpEntityListSummary"></p>
            <div class="kp-modal-search kp-modal-search--list">
              <input type="search" id="kpEntityListSearch" placeholder="検索..." aria-label="検索">
            </div>
            <div class="kp-npc-list-filters" role="tablist" aria-label="表示フィルター">
              <button type="button" class="kp-npc-list-filter is-active" data-kp-list-filter="all" role="tab" aria-selected="true">すべて</button>
              <button type="button" class="kp-npc-list-filter" data-kp-list-filter="active" role="tab" aria-selected="false">有効</button>
              <button type="button" class="kp-npc-list-filter" data-kp-list-filter="visible" role="tab" aria-selected="false">PL表示</button>
              <button type="button" class="kp-npc-list-filter" data-kp-list-filter="hidden" role="tab" aria-selected="false">非表示</button>
              <button type="button" class="kp-npc-list-filter" data-kp-list-filter="deleted" role="tab" aria-selected="false">削除済</button>
            </div>
          </div>
          <div class="kp-modal-body kp-modal-body--list" id="kpEntityListBody">
            <p class="kp-modal-status">読み込み中...</p>
          </div>
        </div>
      </div>

      <div class="kp-modal" id="kpEntityVisibility" hidden aria-hidden="true">
        <div class="kp-modal-backdrop" data-kp-close="kpEntityVisibility"></div>
        <div class="kp-modal-panel" role="dialog" aria-modal="true" aria-labelledby="kpEntityVisibilityTitle">
          <header class="kp-modal-header">
            <h2 class="kp-modal-title" id="kpEntityVisibilityTitle">PLサイトの表示設定</h2>
            <button type="button" class="kp-modal-close" data-kp-close="kpEntityVisibility" aria-label="閉じる">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <p class="kp-modal-hint" id="kpEntityVisibilityHint"></p>
          <div class="kp-modal-search">
            <input type="search" id="kpEntityVisibilitySearch" placeholder="検索..." aria-label="検索">
          </div>
          <div class="kp-modal-body" id="kpEntityVisibilityBody">
            <p class="kp-modal-status">読み込み中...</p>
          </div>
        </div>
      </div>

      <footer class="footer">
        <div class="footer-brand">
          <img src="images/yokofolia-mascot.png" alt="" class="footer-mascot" width="52" height="52" decoding="async">
          <div class="footer-brand-text">
            <span class="footer-name">YOKOFOLIA</span>
            <span class="footer-tagline">ふわっと住民台帳</span>
          </div>
        </div>
        <p class="footer-copy">© 2026- yokofolia</p>
      </footer>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/image-utils.js"></script>
  <script src="js/links.js"></script>
  <script src="kp.js?v=20260715b"></script>
</body>
</html>

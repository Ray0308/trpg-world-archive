<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOKOFOLIA ふわっと住民台帳</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a href="#npcs" class="site-brand site-brand--sidebar">
          <img src="images/yokofolia-mascot.png" alt="" class="site-brand-mascot" width="40" height="40" decoding="async">
          <span class="site-brand-text">
            <span class="site-brand-name">YOKOFOLIA</span>
            <span class="site-brand-tagline">ふわっと住民台帳</span>
          </span>
        </a>
      </div>
      <div class="sidebar-header">
        <button class="sidebar-close" id="sidebarClose" aria-label="メニューを閉じる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <ul class="nav-menu" id="navMenu">
        <li><a href="#npcs" class="nav-link" data-section="npcs"><span class="nav-icon">🧑‍🤝‍🧑</span>NPC</a></li>
        <li><a href="#organizations" class="nav-link" data-section="organizations"><span class="nav-icon">🏛️</span>組織</a></li>
        <li><a href="#scenarios" class="nav-link" data-section="scenarios"><span class="nav-icon">📜</span>シナリオ</a></li>
        <li><a href="#pcs" class="nav-link" data-section="pcs"><span class="nav-icon">👤</span>PC</a></li>
      </ul>
    </nav>

    <div class="main-wrapper">
      <header class="header">
        <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <a href="#npcs" class="site-brand">
          <img src="images/yokofolia-mascot.png" alt="" class="site-brand-mascot" width="36" height="36" decoding="async">
          <span class="site-brand-text">
            <span class="site-brand-name">YOKOFOLIA</span>
            <span class="site-brand-tagline">ふわっと住民台帳</span>
          </span>
        </a>
        <div class="search-global">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" id="globalSearch" placeholder="NPC、組織、シナリオ、PCを検索..." aria-label="全体検索">
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <p class="loading">データを読み込んでいます...</p>
      </main>

      <footer class="footer">
        <div class="footer-brand">
          <img src="images/yokofolia-mascot.png" alt="" class="footer-mascot" width="52" height="52" decoding="async">
          <div class="footer-brand-text">
            <span class="footer-name">YOKOFOLIA</span>
            <span class="footer-tagline">ふわっと住民台帳</span>
          </div>
        </div>
        <p class="footer-copy">© 2026- yokofolia</p>
      </footer>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <script src="js/config.js"></script>
  <script src="js/data/errors.js"></script>
  <script src="js/data/normalize.js"></script>
  <script src="js/data/json-provider.js"></script>
  <script src="js/data/apps-script-provider.js"></script>
  <script src="js/data/sheets-provider.js"></script>
  <script src="js/data/provider.js"></script>
  <script src="js/image-utils.js"></script>
  <script src="script.js"></script>

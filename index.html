<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRPG World Archive — NPC図鑑</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- 左ナビゲーション -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="logo-text">
            <span class="logo-title">TRPGポータル</span>
            <span class="logo-sub">世界観アーカイブ</span>
          </div>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="メニューを閉じる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link"><span class="nav-icon">🏠</span>TOP</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">👤</span>PC図鑑</a></li>
        <li><a href="#" class="nav-link active"><span class="nav-icon">🧑‍🤝‍🧑</span>NPC図鑑</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">📜</span>シナリオ一覧</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">🏛️</span>組織一覧</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">📅</span>年表</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">📖</span>用語集</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">🔗</span>リンク集</a></li>
        <li><a href="#" class="nav-link"><span class="nav-icon">📝</span>メモ</a></li>
      </ul>
      <div class="sidebar-footer">
        <span class="update-label">最終更新</span>
        <time datetime="2025-06-20">2025/06/20 23:45</time>
      </div>
    </nav>

    <!-- メインエリア -->
    <div class="main-wrapper">
      <!-- ヘッダー -->
      <header class="header">
        <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="search-global">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" placeholder="NPC、シナリオ、組織などを検索..." aria-label="全体検索">
        </div>
        <div class="header-actions">
          <button class="btn-icon" aria-label="テーマ切替">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="btn-kp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            KPモード
          </button>
        </div>
      </header>

      <!-- 3カラムコンテンツ -->
      <div class="content-area">
        <!-- 左カラム：NPC一覧 -->
        <aside class="npc-list-panel">
          <div class="panel-header">
            <h2 class="panel-title">NPC図鑑</h2>
            <span class="panel-count" id="npcCount">全 <strong>6</strong> 名</span>
          </div>
          <div class="panel-search">
            <input type="search" id="npcSearch" placeholder="名前・職業で検索" aria-label="NPC検索">
            <select id="npcFilter" aria-label="フィルター">
              <option value="all">すべて</option>
              <option value="alive">生存</option>
              <option value="dead">死亡</option>
              <option value="missing">行方不明</option>
              <option value="important">重要NPC</option>
            </select>
          </div>
          <ul class="npc-list" id="npcList" role="listbox" aria-label="NPC一覧">
            <!-- JSで生成 -->
          </ul>
          <button class="btn-add-npc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            新規NPC登録
          </button>
        </aside>

        <!-- 中央カラム：NPC詳細 -->
        <main class="npc-detail-panel" id="npcDetail">
          <!-- JSで生成 -->
        </main>

        <!-- 右カラム：関連情報 -->
        <aside class="npc-meta-panel" id="npcMeta">
          <!-- JSで生成 -->
        </aside>
      </div>

      <footer class="footer">
        <p>© 2025 TRPGポータル — 世界観アーカイブ</p>
        <p class="footer-note">データの編集はKPのみ可能です</p>
      </footer>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <script src="script.js"></script>
</body>
</html>

    <title>TRPG World Archive</title>

    <h1>TRPG World Archive</h1>
    <p>Hello World</p>
</body>
</html>

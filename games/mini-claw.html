<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121018">
  <meta name="apple-mobile-web-app-title" content="ミ＝ゴキャッチャー">
  <title>ミ＝ゴキャッチャー — YOKOFOLIA</title>
  <link rel="icon" href="../icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <link rel="stylesheet" href="mini-claw.css?v=20260702d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Inter:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="mc-app">
    <header class="mc-header">
      <a href="../index.html#home" class="mc-back">← YOKOFOLIA</a>
      <h1 class="mc-header-title">ミ＝ゴキャッチャー</h1>
      <div class="mc-score-hud">
        <span class="mc-score-label">菌糸コイン</span>
        <span class="mc-score-value" id="coinBalance">—</span>
      </div>
    </header>

    <main class="mc-main">
      <div class="mc-stage-wrap">
        <div class="mc-game-area" id="gameArea">
          <canvas id="gameCanvas" class="mc-canvas" width="360" height="500" draggable="false" aria-label="ミ＝ゴキャッチャー"></canvas>
        </div>
        <div class="mc-loader" id="loadingScreen" role="status" aria-live="polite">
          <img src="assets/migo-mascot.png" alt="ミ＝ゴ" class="mc-loader-image">
          <p class="mc-loader-text">菌糸回線で筐体に接続中…</p>
        </div>

        <div class="mc-controls" id="gameControls" hidden>
          <button type="button" class="mc-ctrl-btn mc-ctrl-btn--left" id="btnLeft" aria-label="左へ"></button>
          <button type="button" class="mc-ctrl-btn mc-ctrl-btn--primary" id="btnDrop" aria-label="鉤爪を下ろす">爪</button>
          <button type="button" class="mc-ctrl-btn mc-ctrl-btn--right" id="btnRight" aria-label="右へ"></button>
        </div>

        <div class="mc-overlay" id="startScreen">
          <div class="mc-panel">
            <p class="mc-kicker">YOKOFOLIA — Mi-go</p>
            <h2 class="mc-title">ミ＝ゴキャッチャー</h2>
            <p class="mc-lore">ユゴスよりの菌類、<strong>薄桃色のミ＝ゴ</strong>の鉤爪が景品を掴む。取った景品は選んだ<strong>PC</strong>の台帳表示が豪華になる。</p>

            <form class="mc-form" id="startForm">
              <label class="mc-field">
                <span class="mc-field-label">プレイヤー名</span>
                <input type="text" id="playerName" maxlength="24" placeholder="PC登録と同じ名前" autocomplete="nickname">
              </label>

              <label class="mc-field">
                <span class="mc-field-label">飾るPC</span>
                <select id="pcSelect" disabled>
                  <option value="">プレイヤー名を入力してください</option>
                </select>
              </label>

              <div class="mc-redeem-row">
                <label class="mc-field mc-field--grow">
                  <span class="mc-field-label">ギフトコード（任意）</span>
                  <input type="text" id="giftCode" maxlength="32" placeholder="MIGO-XXXXXXXX" autocapitalize="characters">
                </label>
                <button type="button" class="mc-btn" id="redeemBtn">換金</button>
              </div>

              <p class="mc-status" id="formStatus" hidden></p>

              <ul class="mc-rules">
                <li>コイン <strong>1枚</strong> で1回プレイ</li>
                <li>毎回、未取得優先で <strong>5種</strong> が並ぶ</li>
                <li>景品はゆらゆら移動するのでタイミング勝負</li>
                <li><strong>◀ ▶</strong> … ミ＝ゴの腕を左右へ</li>
                <li><strong>爪</strong> … 鉤爪を降下して掴む</li>
              </ul>

              <button type="submit" class="mc-btn mc-btn--primary" id="startBtn" disabled>コイン1枚で筐体を起動</button>
            </form>
          </div>
        </div>

        <div class="mc-overlay" id="resultScreen" hidden>
          <div class="mc-panel">
            <h2 class="mc-title" id="resultTitle">結果</h2>
            <p class="mc-result-text" id="resultText"></p>
            <button type="button" class="mc-btn mc-btn--primary" id="resultBtn">もう一度</button>
            <a href="../index.html#home" class="mc-btn mc-btn--ghost" id="resultHomeBtn">ホームに戻る</a>
          </div>
        </div>
      </div>

      <section class="mc-collection" id="collectionPanel" hidden>
        <h2 class="mc-collection-title">このPCのコスメ</h2>
        <p class="mc-collection-progress" id="collectionProgress"></p>
        <ul class="mc-collection-list" id="collectionList"></ul>
      </section>
    </main>

    <footer class="mc-footer">
      <p>© 2026- yokofolia — ミ＝ゴ（Mi-go）/ オマケ</p>
    </footer>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/migo-cosmetics.js?v=20260702"></script>
  <script src="mini-claw.js?v=20260708"></script>
</body>
</html>
